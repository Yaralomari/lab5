{% extends "bookmodule/layouts/base.html" %}
{% load static %}

{% block title %}Show one Book{% endblock %}

{% block content %}
<a href="{% url 'books.list_books' %}">Go Back</a>

<h1>Details of Book</h1>

<h2>{{ book.title }}</h2>
<h2>Author: {{ book.author }}</h2>

<p>
<strong>{{ book.title }}</strong>
{{ book.description }}
</p>

<img src="{% static book.image %}" width="200">
{% endblock %}
